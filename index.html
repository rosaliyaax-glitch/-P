<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>yo. 🧸💚</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- CURSOR -->
<div id="cursor">🎀</div>


<!-- SPARKLES -->
<div id="sparkles"></div>




<!-- PAGE 1: SCRAPBOOK COVER -->

<section id="cover">


    <div class="doodle cat one">🐱</div>
    <div class="doodle cat two">🐈</div>

    <div class="doodle cloud one">☁️</div>

    <div class="doodle star one">⭐</div>
    <div class="doodle star two">✦</div>

    <div class="doodle flower one">🌸</div>
    <div class="doodle flower two">🌷</div>

    <div class="doodle paw">🐾</div>

    <div class="doodle tapir">
        🐽
    </div>



    <div class="scrapbook-title">

        <h1>
            yo.
        </h1>


        <p>
            you found something 👀
        </p>


        <small>
            (a suspicious little scrapbook page)
        </small>


    </div>



    <button id="openGarden">
        open the page 🌸
    </button>


</section>








<!-- PAGE 2: FLOWER GARDEN -->

<section id="garden">


    <div class="garden-items">

        🌷 🌸 🦋 🌼 🌿 🦋 🌸 🌷

    </div>



    <h1>
        secret garden unlocked 🌿
    </h1>


    <p>
        okay okay... you know what to do 🤨
    </p>



    <button id="dabButton">
        dab me up 🤝
    </button>



    <div class="energyBox">

        <div id="energyBar"></div>

    </div>


</section>









<!-- PAGE 3: LETTER -->


<section id="letter">


    <div class="envelope">


        <div class="seal">
            💗
        </div>


        <div class="envelope-flap"></div>


        <div class="letter-paper">


            <div class="pressedRose">
                🌹
            </div>


            <h2>
                hey, lil teddy bear 🧸💚
            </h2>


            <p id="typing"></p>



            <button id="turnPage">
                turn the page 💗
            </button>


        </div>


    </div>


</section>









<!-- FINAL PAGE -->

<section id="ending">


    <div class="bouquet">
        💐
    </div>


    <div class="teddy">
        🧸
    </div>


    <div id="arrow">
        🏹
    </div>


    <div id="heartRain"></div>



    <h1>
        surprise complete 💗
    </h1>


</section>







<audio id="music"

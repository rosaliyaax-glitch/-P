<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>yo. 🧸💚</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="cursor">🎀</div>


<!-- PAGE 1 -->

<section id="cover">

    <div class="doodle">🐱</div>
    <div class="doodle">🐽</div>
    <div class="doodle">🌸</div>
    <div class="doodle">⭐</div>
    <div class="doodle">☁️</div>

    <h1>yo.</h1>

    <p>
        you found something 👀
    </p>


    <button id="openGarden">
        open the page 🌸
    </button>


</section>





<!-- PAGE 2 -->

<section id="garden" class="hidden">


    <h1>
        secret garden unlocked 🌿
    </h1>


    <p>
        okay okay... you know what to do 🤨
    </p>


    <button id="dabButton">
        dab me up 🤝
    </button>


    <div class="energyBox">

        <div id="energyBar"></div>

    </div>


</section>






<!-- PAGE 3 -->

<section id="letter" class="hidden">


    <div class="paper">


        <div class="rose">
            🌹
        </div>


        <h2>
            hey, lil teddy bear 🧸💚
        </h2>


        <p id="typing"></p>


        <button id="turnPage" class="hidden">
            turn the page 💗
        </button>


    </div>


</section>







<!-- FINAL -->

<section id="ending" class="hidden">


    <h1>
        surprise 💗
    </h1>


    <div>
        💐 🧸 🏹
    </div>


</section>






<audio id="music" loop>

<source src="music/melody.mp3">

</audio>



<script src="script.js"></script>


</body>

</html>
